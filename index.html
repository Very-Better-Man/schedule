    <style>
        body { background-color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .bg-amia { background-color: #1e3a8a; }
        
        .compact-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 10px;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
        }
        
        /* Текущая пара */
        .card-current {
            border-color: #bfdbfe;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.15);
            transform: scale(1.01);
        }
        
        /* Прошедшая пара */
        .card-past { opacity: 0.65; background: #f8fafc; border-color: #f1f5f9; }

        .card-free { background: #f0fdf4; border-color: #dcfce7; }
        .card-vacation { background: #fffbeb; border-color: #fef3c7; }
        .card-move { background: #fff7ed; border-color: #ffedd5; }

        .period-box {
            background: #f8fafc;
            border-radius: 10px;
            min-width: 65px;
            padding: 4px;
        }
        
        .fire-anim { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.7; transform: scale(0.95); } }

        .btn-mode { border-radius: 10px; font-weight: 700; font-size: 0.7rem; transition: 0.2s; }
        .btn-active { background: #3b82f6; color: white; }
        .btn-inactive { background: white; color: #64748b; border: 1px solid #e2e8f0; }
    </style>
</head>

        ];

        const daysOfWeek = ["Воскресенье", "Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота"];
        const months = ["января", "февраля", "марта", "апреля", "мая", "июня", "июля", "августа", "сентября", "октября", "ноября", "декабря"];

        function getTimeStatus(lessonTime, lessonDateStr) {
            const now = new Date();
            const [startStr, endStr] = lessonTime.split('-');
            
            const startDate = new Date(lessonDateStr);
            const [sH, sM] = startStr.split(':');
            startDate.setHours(sH, sM, 0);
            
            const endDate = new Date(lessonDateStr);
            const [eH, eM] = endStr.split(':');
            endDate.setHours(eH, eM, 0);

            if (now >= startDate && now <= endDate) return 'current';
            if (now > endDate) return 'past';
            return 'future';
        }

        function changeDate(offset) {
            const dp = document.getElementById('datePicker');
            const d = new Date(dp.value);
            d.setDate(d.getDate() + (viewMode === 'week' ? offset * 7 : offset));
            dp.value = d.toISOString().split('T')[0];
            updateUI();
        }

        function setViewMode(mode) {
            viewMode = mode;
            document.getElementById('btnDay').className = mode === 'day' ? 'btn-mode btn-active px-4 py-1.5 uppercase' : 'btn-mode btn-inactive px-4 py-1.5 uppercase';
            document.getElementById('btnWeek').className = mode === 'week' ? 'btn-mode btn-active px-4 py-1.5 uppercase' : 'btn-mode btn-inactive px-4 py-1.5 uppercase';
            updateUI();
        }

        function renderLessons(filtered, container, dateStr) {
            if (filtered.length === 0) {
                container.innerHTML += `<div class="p-8 text-center text-gray-400 text-[11px] font-bold uppercase tracking-widest bg-white rounded-xl border border-gray-100">Занятий нет</div>`;
                return;
            }

            filtered.forEach(item => {
                const status = getTimeStatus(item.time, dateStr);
                
                let circleBg = '';
                let circleIcon = '';
                let statusClass = '';
                let cardTypeClass = 'card-lesson';
                
                if (status === 'current') {
                    circleBg = 'bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.6)]';
                    circleIcon = '<i class="fa-solid fa-fire text-white fire-anim"></i>';
                    statusClass = 'card-current';
                } else if (status === 'past') {
                    circleBg = 'bg-green-100';
                    circleIcon = '<i class="fa-solid fa-check text-green-600"></i>';
                    statusClass = 'card-past';
                } else {
                    if (item.subject === "свободное время") { circleBg = 'bg-green-50'; circleIcon = '<i class="fa-solid fa-couch text-green-500 text-xs"></i>'; }
                    else if (item.subject === "отпуск") { circleBg = 'bg-yellow-50'; circleIcon = '<i class="fa-solid fa-umbrella-beach text-yellow-500 text-xs"></i>'; }
                    else if (item.subject === "Переезд") { circleBg = 'bg-orange-50'; circleIcon = '<i class="fa-solid fa-person-walking-luggage text-orange-500 text-xs"></i>'; }
                    else { circleBg = 'bg-gray-100'; circleIcon = '<i class="fa-regular fa-clock text-gray-400 text-xs"></i>'; }
                }

                if (item.subject === "свободное время") cardTypeClass = 'card-free';
                else if (item.subject === "отпуск") cardTypeClass = 'card-vacation';
                else if (item.subject === "Переезд") cardTypeClass = 'card-move';

                container.innerHTML += `
                    <div class="compact-card p-2.5 pr-3 flex items-center gap-3 ${statusClass} ${cardTypeClass}">
                        
                        <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${circleBg}">
                            ${circleIcon}
                        </div>

                        <div class="period-box text-center shrink-0 border border-gray-100 py-1">
                            <div class="text-[8px] uppercase font-black text-gray-400 leading-none">Пара ${item.period}</div>
                            <div class="text-[11px] font-black text-amia leading-tight mt-0.5">${item.time}</div>
                        </div>

                        <div class="flex-grow min-w-0 py-0.5">
                            <div class="flex items-center text-[9px] font-bold uppercase tracking-tighter mb-0.5">
                                <span class="${item.secret ? 'text-red-500' : 'text-blue-500'}">${item.type}</span>
                            </div>
                            <h2 class="text-[13px] font-bold text-gray-800 truncate leading-tight">${item.subject}${item.secret ? '*' : ''}</h2>
                            ${item.topic ? `<div class="text-[10px] text-blue-600 font-semibold mb-0.5 truncate">${item.topic}</div>` : ''}
                            <div class="flex items-center gap-2 text-[10px] text-gray-500 mt-0.5 truncate">
                                <span><i class="fa-solid fa-location-dot mr-1 text-gray-300"></i>${item.room}</span>
                                <span><i class="fa-solid fa-user mr-1 text-gray-300 text-[8px]"></i>${item.teacher}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function updateUI() {
            const dp = document.getElementById('datePicker');
            const gs = document.getElementById('groupSelect');
            const list = document.getElementById('scheduleList');
            const dd = document.getElementById('dateDisplay');
            
            const selDate = new Date(dp.value);
            dd.innerHTML = `${daysOfWeek[selDate.getDay()]}<br>${selDate.getDate()} ${months[selDate.getMonth()]}`;
            list.innerHTML = '';
            
            // Проверка: выбрана ли группа
            if (!gs.value) {
                list.innerHTML = `
                    <div class="p-8 mt-4 text-center text-gray-400 bg-white rounded-xl border border-gray-100 shadow-sm flex flex-col items-center">
                        <div class="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center mb-3">
                            <i class="fa-solid fa-users text-xl text-gray-300"></i>
                        </div>
                        <div class="text-[12px] font-bold text-gray-500 uppercase tracking-widest">Выберите группу</div>
                        <div class="text-[10px] mt-1">чтобы увидеть расписание</div>
                    </div>`;
                return;
            }

            if (viewMode === 'day') {
                const dateStr = dp.value;
                const filtered = lessons.filter(l => l.date === dateStr && l.group === gs.value).sort((a,b) => a.period - b.period);
                renderLessons(filtered, list, dateStr);
            } else {
                const curr = new Date(selDate);
                const day = curr.getDay();
                const diff = curr.getDate() - day + (day === 0 ? -6 : 1);
                const monday = new Date(curr.setDate(diff));

                for (let i = 0; i < 6; i++) {
                    const d = new Date(monday);
                    d.setDate(monday.getDate() + i);
                    const ds = d.toISOString().split('T')[0];
                    
                    list.innerHTML += `<div class="text-[11px] font-black text-gray-400 uppercase tracking-widest mt-5 mb-2 pl-1 border-b border-gray-200 pb-1">${daysOfWeek[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}</div>`;
                    const filtered = lessons.filter(l => l.date === ds && l.group === gs.value).sort((a,b) => a.period - b.period);
                    renderLessons(filtered, list, ds);
                }
            }
        }

        // Авто-установка сегодняшней даты
        const today = new Date();
        const localDate = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        document.getElementById('datePicker').value = localDate;

        document.getElementById('datePicker').addEventListener('change', updateUI);
        document.getElementById('groupSelect').addEventListener('change', updateUI);
        
        setInterval(updateUI, 60000); 
        updateUI();
    </script>
