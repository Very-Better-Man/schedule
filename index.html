        .glass-card {

            transition: all 0.3s ease;

        .card-lesson { border-left: 8px solid #3b82f6; }

        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.5; transition: 0.2s; }

        function changeDate(offset) {
            const dateInput = document.getElementById('datePicker');
            const d = new Date(dateInput.value);
            
            // Если выбран режим недели, умножаем шаг на 7 дней
            if (viewMode === 'week') {
                d.setDate(d.getDate() + (offset * 7));
            } else {
                d.setDate(d.getDate() + offset);
            }
            
            dateInput.value = d.toISOString().split('T')[0];
            updateUI();
        }

            updateUI();
        }

        function getCardStyle(subject) {
            if (subject === "свободное время") return { class: "card-free", icon: "fa-couch text-green-600" };
            if (subject === "отпуск") return { class: "card-vacation text-center", icon: "fa-umbrella-beach text-yellow-600" };
            if (subject === "Переезд") return { class: "card-move", icon: "fa-person-walking-luggage text-orange-500" };
            
            let icon = "fa-book-open text-blue-500";
            if (subject.includes("Криминалистика") || subject.includes("Крим-ка")) icon = "fa-microscope text-purple-500";
            if (subject.includes("Право") || subject.includes("процесс") || subject.includes("МПП") || subject.includes("Квал")) icon = "fa-scale-balanced text-yellow-600";
            if (subject.includes("ТСП") || subject.includes("ОРД")) icon = "fa-user-secret text-gray-700";
            if (subject.includes("ППФП")) icon = "fa-dumbbell text-green-600";
            if (subject.includes("ИОСД") || subject.includes("КСиС")) icon = "fa-laptop-code text-blue-500";
            if (subject.includes("Огневая")) icon = "fa-crosshairs text-red-600";
            
            return { class: "card-lesson", icon: icon };
        }

                        </div>

                            <i class="fa-solid ${style.icon} opacity-80 text-xl w-6"></i> ${item.subject}
                        </h2>
                        <div class="flex flex-wrap gap-x-6 gap-y-2 text-sm font-semibold text-gray-600">
                            <span class="flex items-center"><i class="fa-solid fa-user-tie mr-2 text-blue-400"></i>${item.teacher}</span>
                            <span class="flex items-center"><i class="fa-solid fa-location-dot mr-2 text-blue-400"></i>${item.room}</span>
                        </div>
                    `;
                } else {
                    detailsHtml = `
                        <h2 class="text-2xl font-extrabold text-gray-800 flex items-center gap-4">
                            <i class="fa-solid ${style.icon} text-3xl"></i> ${item.subject}
                        </h2>
                    `;
                }

                container.innerHTML += `
                    <div class="glass-card p-5 flex flex-col md:flex-row md:items-stretch gap-5 rounded-3xl ${style.class}">
                        <div class="period-badge rounded-2xl p-4 flex flex-col justify-center items-center md:w-36 shrink-0 border border-blue-50/50">
                            <div class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-1">Пара ${item.period}</div>
                            <div class="text-lg font-black text-amia tracking-tight text-center">${item.time}</div>
                        </div>
                        <div class="flex-grow flex flex-col justify-center">${detailsHtml}</div>
                    </div>
                `;
            });
        }
// --- АВТОМАТИЧЕСКАЯ УСТАНОВКА СЕГОДНЯШНЕЙ ДАТЫ ---
        const today = new Date();
        // Корректируем часовой пояс, чтобы дата не сбивалась
        const localDate = new Date(today.getTime() - (today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        document.getElementById('datePicker').value = localDate;
        // -------------------------------------------------
        function updateUI() {
            const selectedDate = document.getElementById('datePicker').value;
            const selectedGroup = document.getElementById('groupSelect').value;
            const listContainer = document.getElementById('scheduleList');
            const dayDisplay = document.getElementById('currentDayDisplay');

            const dateObj = new Date(selectedDate);
            dayDisplay.innerHTML = `<span class="text-blue-200">${daysOfWeek[dateObj.getDay()]}</span><br/>${dateObj.getDate()} ${months[dateObj.getMonth()]}`;
            listContainer.innerHTML = '';

            if (viewMode === 'day') {
                const filtered = lessons.filter(l => l.date === selectedDate && l.group === selectedGroup).sort((a, b) => a.period - b.period);
                renderLessons(filtered, listContainer);
            } else {
                // Логика Недели: находим понедельник выбранной даты
                const currentDay = dateObj.getDay();
                const diff = dateObj.getDate() - currentDay + (currentDay === 0 ? -6 : 1);
                const monday = new Date(dateObj.setDate(diff));

                for (let i = 0; i < 6; i++) { // Пн - Сб
                    const targetDate = new Date(monday);
                    targetDate.setDate(monday.getDate() + i);
                    const dateStr = targetDate.toISOString().split('T')[0];
                    
                    const filtered = lessons.filter(l => l.date === dateStr && l.group === selectedGroup).sort((a, b) => a.period - b.period);
                    
                    if (filtered.length > 0 || dateStr === selectedDate) {
                        listContainer.innerHTML += `
                            <div class="mt-8 mb-4 pl-4 border-l-4 border-blue-300">
                                <h3 class="text-xl font-bold text-gray-700">${daysOfWeek[targetDate.getDay()]}, <span class="text-blue-500">${targetDate.getDate()} ${months[targetDate.getMonth()]}</span></h3>
                            </div>
                        `;
                        renderLessons(filtered, listContainer);
                    }
                }
            }
        }

        document.getElementById('datePicker').addEventListener('change', updateUI);
        document.getElementById('groupSelect').addEventListener('change', updateUI);

        updateUI();
    </script>
</body>
</html>
